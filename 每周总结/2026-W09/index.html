<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>每周金融情报要点总结</title>
    <link rel="stylesheet" href="assets/styles.8deefd14.css">
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar">
        <a href="../金融洞察/index.html" class="nav-brand">金融情报洞察</a>
        
        <button class="menu-toggle" id="menu-toggle">☰</button>
        
        <div class="nav-tabs" id="nav-tabs">
            <a href="../金融洞察/index.html" class="nav-tab" data-tab="daily">每日洞察</a>
            <a href="./index.html" class="nav-tab active" data-tab="weekly">每周要点总结</a>
        </div>
    </nav>
    
    <div class="container">
        <div class="main-content">
            <!-- 页眉 -->
            <div class="header">
                <h1 class="title">每周金融情报要点总结</h1>
                <div class="subtitle">基于自动评分系统，汇总当周最高价值洞察</div>
                <div class="week-info" id="week-info">第9周（2026年02月23日 - 2026年03月01日）</div>
            </div>
            
            <!-- 二级导航Tabs -->
            <div class="sub-nav-tabs">
                <button class="sub-nav-tab active" data-tab="current-week">本周要点</button>
                <button class="sub-nav-tab" data-tab="history">历史报告</button>
            </div>
            
            <!-- Tab内容容器 -->
            <div class="tab-content">
                <!-- 本周要点Tab内容 -->
                <div id="current-week-tab" class="tab-pane active">
                    <div class="weekly-summary-stats">
                        <div class="stat-card">
                            <div class="stat-value" id="total-insights">0</div>
                            <div class="stat-label">本周总洞察数</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-value" id="included-insights">0</div>
                            <div class="stat-label">收录要点数</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-value" id="avg-score">0.0</div>
                            <div class="stat-label">平均评分</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-value" id="threshold-rate">0.0%</div>
                            <div class="stat-label">达标率</div>
                        </div>
                    </div>
                    
                    <div id="insights-container" class="insights-grid">
                        
            <div class="empty-state" style="grid-column: 1 / -1; text-align: center; padding: 60px 20px;">
                <div style="font-size: 48px; margin-bottom: 20px;">📊</div>
                <h3 style="color: var(--text-primary); margin-bottom: 10px;">本周暂无收录要点</h3>
                <p style="color: var(--text-secondary); max-width: 500px; margin: 0 auto;">
                    本周生成的洞察尚未达到收录标准（≥6.0分）。请查看历史报告或等待新数据生成。
                </p>
            </div>
            
                    </div>
                </div>
                
                <!-- 历史报告Tab内容 -->
                <div id="history-tab" class="tab-pane">
                    <div id="history-container" class="history-container">
                        <!-- 历史报告列表将由脚本动态生成 -->
                        <div class="loading"></div>
                    </div>
                </div>
            </div>
            
            <!-- 页脚 -->
            <div class="footer">
                <p>数据来源：路透社、彭博社、金融时报、华尔街日报、财新网、IMF、世界银行等权威机构官方披露</p>
                <p>信息截止时间：每周五17:30（北京时间）</p>
                <div class="disclaimer">
                    免责声明：本总结基于每日洞察自动评分系统生成，仅供决策参考，不构成任何投资建议。市场有风险，决策需谨慎。
                </div>
            </div>
        </div>
    </div>
    
    <!-- 每周要点总结渲染引擎 -->
    <script src="assets/render_weekly_summary.ad278d73.js"></script>
</body>
</html>
